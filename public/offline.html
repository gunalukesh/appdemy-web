<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appdemy — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #FAFAFA; color: #292827; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { text-align: center; max-width: 400px; }
    .icon { width: 80px; height: 80px; background: #FF4A13; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 36px; }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    p { color: #B8563B; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    button { background: #FF4A13; color: white; border: none; padding: 12px 32px; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; }
    button:hover { background: #B8563B; }
    .ta { font-size: 12px; color: #A5BAC2; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📚</div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. Please check your Wi-Fi or mobile data and try again.</p>
    <p class="ta">இணைய இணைப்பு இல்லை. உங்கள் Wi-Fi-ஐ சரிபார்க்கவும்.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
